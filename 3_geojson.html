<!-- 
    Assignment 3: Adding GeoJSON to a Web Map

    In this assignment, you will add a GeoJSON of school attendance areas for Duluth to your web map. 
    You will also customize the styling and popups for the GeoJSON layer.

    Tasks:

    1. Download and simplify School Attendance Area Boundaries

    I downloaded this data from the MnGeoCommons. The source for the data is the Minnesota Department of Education. 
    The data has been filtered to the Duluth Public School District and re-projected to WGS 84 (EPSG:4326) 
    to make it compatible with our Leaflet map.
    In this step you will use Mapshaper to convert (and optimally simplify) the shapefile to GeoJSON format.

        - Download the data: https://github.com/kristofj-umd/webdev-unit/raw/master/duluth_school_attendance_areas.zip
        - Load the zipped shapefile into https://mapshaper.org/ (or your GIS software of choice)
        - Simplify the geometry. Play around with the simplification settings until you find one you like.
        - Export the data as a GeoJSON
            - Further simplify the data by specifying a coordinate precision in the export command line options
                 by typing in precision=0.001

    2. Add GeoJSON of Attendance Areas to the map
    Make sure to credit the source of the data by adding an attribution for it to the map.
        - Leaflet GeoJSON tutorial: https://leafletjs.com/examples/geojson/
        - GeoJSON reference: https://geojson.org/

    3. Update GeoJSON Styling
    Create a style function to customize the styling for your Attendance Areas.
        - To help distinguish the areas from one another consider using a random color generator. 
            - Lots of options are listed here: https://stackoverflow.com/questions/1484506/random-color-generator

    4. Add Popups to GeoJSON
    Add functionality so that when the user clicks on an attendance area, the schools for that area are listed in the popup.

    5. Add a Layout
    - Add some HTML and CSS to your web page to complement your map. 
    - At a minimum, this should include a title and subtitle for your map, but feel free to get creative and add some style!
    
    6. Finishing Up
        - In case it wasn't already obvious, you've created a thematic map. 
            That means you might need to update your basemap to something more plain and subdued (think figure-ground).
        - Also modify the map extent (so you can see all but the large northern attendance areas).
        - Make sure the code is organized and well commented so that someone else can understand what you did and how you did it.

    AI use: you can use AI as much as you like, but make sure to understand and verify the code it generates.
    I expect every block of code to have a comment above it describing what it does and how it works. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- edit: changed title to something more relevant -->
    <title>Duluth School Districts</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- edit: added CCS code to stylize web page, including a background image -->
        <style>
            body{
                background-image: url("https://www.nikkisplate.com/wp-content/uploads/2023/01/Blush-Pink-Wallpaper-for-Desktop-7.png");
            }
            h1{
                font-family: Papyrus;
                font-weight: bold;
                color: yellow;
                text-shadow: 2px 2px 3px black;
            }
            p{
                font-family: Arial;
                color: salmon;
                text-shadow: 1px 1px 2px yellow;
            }
            h3{
                font-family: Arial;
                font-style: Bold;
                color: black;
            }
            .maindesc{
                font-family: Papyrus;
                color: lightyellow;
                text-shadow: 1px 1px 2px black;
            }
        </style>
</head>

<body>
    <!-- Header at the top of the page -->
     <!-- edit: added a title and short description -->
    <div class="header">
        <h1>Duluth, MN School Districts</h1>
        <h3 class="maindesc">Each district shows the corresponding elementary, middle, and high school.</h3>
    </div>

    <!-- edit: adjusted map size to 1400 by 520 and added some stylization -->
    <div id="map" style="width: 1400px; height: 520px; border: 4px solid yellow; box-shadow: 0px 0px 8px black;"></div>
    
    <!-- edit: added a source to the bottom of the page -->
    <div>
        <h4><em>Data Source: Minnesota Department of Education</em></h4>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // edit: added a random color generator function from stackoverflow.com
        function getRandomColor() {
            var letters = '0123456789ABCDEF';
            var color = '#';
            for (var i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        // edit: added popups for wach district
        function attendanceAreasPopupOnEachFeature(feature, layer) {
            const popupContent = `
            <h3>Attendance Area Schools</h3>
            <p><em>elementary school: </em><b>${feature.properties.ELEM_NAME}</b></p>
            <p><em>middle school: </em><b>${feature.properties.MIDD_NAME}</b></p>
            <p><em>high school: </em><b>${feature.properties.HIGH_NAME}</b></p>
            `;
        }

        // edit: added stylization to each district 
        function attendanceAreasStyle() {
            return{
                color: getRandomColor(),
                weight: 3,
                fillOpacity: 0.25,
            }
        }

        // Initialize the map, center it on Duluth, and set the zoom level
        // edit: changed default zoom level
        const map = L.map('map').setView([46.8, -92.08], 11);

        // edit: changed the basemap to something simpler
        var CartoDB_Positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
	        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
	        subdomains: 'abcd',
	        maxZoom: 20
        });
        CartoDB_Positron.addTo(map);

        // edit: fetch the GeoJSON file
        fetch("duluth_school_attendance_areas.json")
            // edit: convert the response into a JSON format
            .then(function (resp) {
                const responseJSON = resp.json()
                console.log(responseJSON)
                // edit: pass along the JSON to next function
                return responseJSON
            })
            .then(function(geojsonData) {
                console.log('the geoJSON data', geojsonData)
                L.geoJSON(geojsonData,
                    {
                        style: attendanceAreasStyle,
                        onEachFeature: attendanceAreasPopupOnEachFeature
                    }
                ).addTo(map);
            })

    </script>
</body>
</html>
